<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- Body -->
  <rect x="10" y="40" width="80" height="55" rx="2" fill="#c8892a" stroke="#7a4e0f" stroke-width="2"/>

  <!-- Top flap left -->
  <rect x="10" y="20" width="37" height="22" rx="1" fill="#e0a040" stroke="#7a4e0f" stroke-width="2"/>

  <!-- Top flap right -->
  <rect x="53" y="20" width="37" height="22" rx="1" fill="#e0a040" stroke="#7a4e0f" stroke-width="2"/>

  <!-- Tape strip vertical -->
  <rect x="44" y="20" width="12" height="75" fill="#d4c27a" opacity="0.85"/>

  <!-- Tape edges -->
  <line x1="44" y1="20" x2="44" y2="95" stroke="#b8a855" stroke-width="0.8"/>
  <line x1="56" y1="20" x2="56" y2="95" stroke="#b8a855" stroke-width="0.8"/>

  <!-- Label -->
  <rect x="14" y="52" width="24" height="28" rx="2" fill="#ede5c5" stroke="#b09860" stroke-width="1"/>
  <line x1="18" y1="60" x2="34" y2="60" stroke="#a09070" stroke-width="1.2"/>
  <line x1="18" y1="66" x2="34" y2="66" stroke="#a09070" stroke-width="1"/>
  <line x1="18" y1="72" x2="30" y2="72" stroke="#a09070" stroke-width="1"/>

</svg>